<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48">
  <!-- Black background -->
  <rect width="220" height="48" fill="#1a1a18" rx="4"/>

  <!-- UKS — Cormorant Garamond style serif wordmark -->
  <text
    x="10"
    y="38"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="44"
    font-weight="300"
    letter-spacing="6"
    fill="#ffffff"
  >UKS</text>

  <!-- INTERIORS — Inter sans-serif small caps -->
  <text
    x="13"
    y="48"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="5"
    fill="#ffffff"
    opacity="0.65"
  >INTERIORS</text>
</svg>
